<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Smart Study Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="theme.js"></script>
</head>
<body>

  <!-- Fullscreen background video -->
  <video class="video-background" autoplay loop muted playsinline>
    <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_131748_f2ca2a28-fed7-44c8-b9a9-bd9acdd5ec31.mp4" type="video/mp4">
  </video>

  <!-- Content wrapper -->
  <div class="content-wrapper">

    <!-- Navigation Bar -->
    <nav class="relative z-10 flex row justify-between px-8 py-6 max-w-7xl mx-auto items-center" style="background: transparent; border-bottom: none; box-shadow: none;">
      <div class="flex items-center">
        <h1 class="text-xl tracking-tight text-foreground cursor-pointer" style="font-family: var(--font-body); font-weight: 600; margin: 0;" onclick="window.location.href='index.html'">Smart Study Planner</h1>
      </div>
      <div class="hidden md:flex items-center gap-8 text-sm"></div>
      <div class="flex items-center gap-4">
        <a href="login.html" style="text-decoration: none;"><button style="cursor:pointer; background:transparent; border:none; color: var(--text-primary); font-size: 0.85rem; padding: 8px 16px; font-family: var(--font-body); font-weight: 600;">Login</button></a>
        <a href="signup.html" style="text-decoration: none;"><button class="liquid-glass rounded-full px-6 py-2.5 text-sm text-foreground hover:scale-[1.03]" style="cursor: pointer; border-radius: 50px; font-family: var(--font-body); font-weight: 600;">Begin Journey</button></a>
      </div>
    </nav>

    <section class="dashboard-box animate-fade-rise" style="max-width: 400px; margin: 60px auto; padding: 40px; text-align: center;">
      <h2 style="margin-top: 0; font-weight: normal; font-size: 2.5rem; font-family: 'Instrument Serif', serif;">Sign Up</h2>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Create an account to save your tasks and stats globally.</p>
    <form id="signupForm" style="display:flex; flex-direction:column; gap:20px; margin-top:20px; align-items: stretch;">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="signup" style="padding:14px; font-size:16px; cursor:pointer; width:100%;">Create Account</button>
      <p id="errorMsg" style="color:#ff4444; font-size:14px; margin:0;"></p>
    </form>
  </section>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        
        try {
            const res = await fetch('/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                alert("Account created successfully! Please log in.");
                window.location.href = 'login.html';
            } else {
                errorMsg.innerText = data.error;
            }
        } catch (err) {
            errorMsg.innerText = "Connection error";
        }
    });
  </script>
  </div> <!-- End content-wrapper -->
</body>
</html>
